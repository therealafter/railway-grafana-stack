global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'keyslab-server'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['keyslab-server.railway.internal:3333']
        labels:
          service: keyslab-server
